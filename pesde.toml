name = "ernisto/redraw"
version = "0.1.0-alpha.1"
description = "terminal drawing module for luau"
authors = ["ernisto <joaovitordesouza707@gmail.com>"]
repository = "https://github.com/ernisto/re-draw"
license = "MIT"

includes = ["lib/**", "pesde.toml", "README.md", "LICENSE", ".luaurc"]

[target]
environment = "luau"
